services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-heyspace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-heyspace}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount source so code edits + generated migrations land on the host.
      - ./src:/app/src
      - ./migrations:/app/migrations
      # Mount assets so brand images (embed bar, etc.) update without a rebuild.
      - ./assets:/app/assets
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
